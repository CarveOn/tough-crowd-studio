document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

6\" style=\"font-size:clamp(17px,1.5vw,21px);line-height:1.55;color:#46443E;max-width:64ch;margin:30px 0 0;\">About 15 minutes, no technical skill needed. Claude Code comes as a friendly desktop app for Mac, a normal window where you chat in plain English and watch it work. A Terminal exists underneath for the rare one-off, but day to day you never open it.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1px;background:rgba(17,17,16,.14);margin-top:56px;border:1px solid rgba(17,17,16,.14);\">\n      <sc-for list=\"{{ setupSteps }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div data-reveal=\"{{ s.d }}\" style=\"background:#F4F3EE;padding:30px 28px;\" style-hover=\"background:#fff;\">\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:28px;color:#E94560;letter-spacing:-.02em;\">{{ s.n }}<\u002Fdiv>\n          <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:19px;letter-spacing:-.01em;margin:16px 0 0;\">{{ s.title }}<\u002Fh3>\n          <p style=\"font-size:14.5px;line-height:1.55;color:#56544D;margin:12px 0 0;\">{{ s.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div data-reveal=\"0.05\" style=\"margin-top:40px;border:1px solid #0E0E0F;background:#0E0E0F;color:#E6E5DF;font-family:'IBM Plex Mono',monospace;\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.12);\">\n        <span style=\"width:11px;height:11px;border-radius:50%;background:#E94560;\"><\u002Fspan>\n        <span style=\"width:11px;height:11px;border-radius:50%;background:#FFD460;\"><\u002Fspan>\n        <span style=\"width:11px;height:11px;border-radius:50%;background:#16C79A;\"><\u002Fspan>\n        <span style=\"margin-left:8px;font-size:12px;letter-spacing:.06em;color:rgba(230,229,223,.6);\">CLAUDE.md — the studio’s operating brain<\u002Fspan>\n      <\u002Fdiv>\n      <pre style=\"margin:0;padding:24px clamp(18px,3vw,32px);font-size:13px;line-height:1.75;white-space:pre-wrap;overflow-x:auto;\"><span style=\"color:#76746C;\"># Tough Crowd Studio — operating brain<\u002Fspan>\n\n<span style=\"color:#FFD460;\">## Who we are<\u002Fspan>\nTough Crowd Studio. Owner: Justin Murtagh. Branding specialist.\n25 years of professional judgement. \"Stand out from the noise.\"\nWe sell taste and judgement, not hours.\n\n<span style=\"color:#FFD460;\">## Pricing rules (enforce these)<\u002Fspan>\n<span style=\"color:#E94560;\">-<\u002Fspan> Price reflects experience and outcome, never hours.\n<span style=\"color:#E94560;\">-<\u002Fspan> NEVER show hours, day-rates or time estimates to a client.\n<span style=\"color:#E94560;\">-<\u002Fspan> The Google Sheet is the single source of truth for pricing.\n<span style=\"color:#E94560;\">-<\u002Fspan> All client money in pounds, fixed fees, value not effort.\n\n<span style=\"color:#FFD460;\">## Brand voice (all written output)<\u002Fspan>\n<span style=\"color:#E94560;\">-<\u002Fspan> UK English. No em dashes, ever.\n<span style=\"color:#E94560;\">-<\u002Fspan> Confident, sharp, no hype, no filler. Premium and human.\n<span style=\"color:#E94560;\">-<\u002Fspan> Never sound like first-generation AI output.\n\n<span style=\"color:#FFD460;\">## Do / Don't<\u002Fspan>\n<span style=\"color:#16C79A;\">DO<\u002Fspan> explain what you're about to do in plain English first.\n<span style=\"color:#16C79A;\">DO<\u002Fspan> warn me before anything that deletes, overwrites or goes live.\n<span style=\"color:#E94560;\">DON'T<\u002Fspan> send any email automatically. Draft only. I send.\n<span style=\"color:#E94560;\">DON'T<\u002Fspan> deploy live without asking. DON'T invent client facts.<span style=\"display:inline-block;width:9px;height:16px;background:#E94560;vertical-align:-2px;margin-left:4px;animation:tcBlink 1.1s step-end infinite;\"><\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:rgba(17,17,16,.14);margin-top:40px;border:1px solid rgba(17,17,16,.14);\">\n      <sc-for list=\"{{ connectGrid }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <div data-reveal=\"{{ c.d }}\" style=\"background:#F4F3EE;padding:26px 24px;\">\n          <h4 style=\"font-family:'Space Grotesk';font-weight:600;font-size:16px;margin:0;\">{{ c.title }}<\u002Fh4>\n          <p style=\"font-size:14px;line-height:1.5;color:#56544D;margin:10px 0 0;\">{{ c.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n\n<section id=\"website\" data-pxhost=\"\" style=\"position:relative;padding:clamp(90px,12vh,160px) clamp(20px,4vw,52px);border-top:1px solid rgba(17,17,16,.1);\">\n  <div style=\"max-width:1180px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:30px;height:1px;background:#E94560;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#E94560;font-weight:500;\">04 / Phase 1 · The website<\u002Fspan><\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-family:'Space Grotesk';font-weight:500;font-size:clamp(34px,5.4vw,78px);line-height:1.0;letter-spacing:-.025em;margin:26px 0 0;max-width:16ch;\">The shop window that does the qualifying.<\u002Fh2>\n    <p data-reveal=\"0.06\" style=\"font-size:clamp(17px,1.5vw,21px);line-height:1.55;color:#46443E;max-width:64ch;margin:30px 0 0;\">A tight, finished site that wins work. Fewer pages, each one done properly. The whole thing hosts free on Cloudflare Pages. Here is the positioning, the structure, and the copy to start from.<\u002Fp>\n\n    <blockquote data-reveal=\"0.05\" style=\"margin:72px 0 0;border-top:1px solid rgba(17,17,16,.18);border-bottom:1px solid rgba(17,17,16,.18);padding:48px 0;\">\n      <p style=\"font-family:'Newsreader',serif;font-style:italic;font-weight:400;font-size:clamp(24px,3.4vw,46px);line-height:1.32;letter-spacing:-.01em;margin:0;max-width:24ch;color:#1a1a18;\">The work that stands out now isn’t louder, it’s <span style=\"color:#E94560;\">considered.<\u002Fspan> It carries a decision behind every choice, made by someone who has made that decision ten thousand times.<\u002Fp>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#76746C;margin-top:24px;\">The thesis · in Justin’s voice<\u002Fdiv>\n    <\u002Fblockquote>\n\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#E94560;margin-top:72px;\">Three headline options<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1px;background:rgba(17,17,16,.14);margin-top:18px;border:1px solid rgba(17,17,16,.14);\">\n      <sc-for list=\"{{ headlines }}\" as=\"h\" hint-placeholder-count=\"3\">\n        <div data-reveal=\"{{ h.d }}\" style=\"background:#F4F3EE;padding:32px 28px;display:flex;flex-direction:column;gap:14px;\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#0E0E0F;\">{{ h.label }}<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.04em;color:#E94560;\">{{ h.note }}<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:23px;line-height:1.1;letter-spacing:-.015em;margin:0;\">{{ h.head }}<\u002Fh3>\n          <p style=\"font-size:14.5px;line-height:1.55;color:#56544D;margin:0;\">{{ h.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#E94560;margin-top:72px;\">The services menu<\u002Fdiv>\n    <p data-reveal=\"\" style=\"font-size:16px;line-height:1.55;color:#46443E;max-width:62ch;margin:14px 0 0;\">Two layers. The client sees fixed “from” prices that signal the level of judgement. You keep the hours private. The red figure is for your eyes only, it never reaches the site.<\u002Fp>\n    <div style=\"margin-top:28px;border-top:1px solid rgba(17,17,16,.18);\">\n      <sc-for list=\"{{ services }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div data-reveal=\"{{ s.d }}\" style=\"display:grid;grid-template-columns:minmax(180px,1.1fr) 2fr auto;gap:clamp(16px,3vw,40px);align-items:center;padding:26px 0;border-bottom:1px solid rgba(17,17,16,.18);\" style-hover=\"background:rgba(233,69,96,.04);\">\n          <div>\n            <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(20px,2.4vw,28px);letter-spacing:-.015em;margin:0;\">{{ s.name }}<\u002Fh3>\n            <div style=\"font-family:'Space Grotesk';font-weight:500;font-size:18px;color:#E94560;margin-top:6px;\">{{ s.price }}<\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.5;color:#56544D;margin:0;\">{{ s.body }}<\u002Fp>\n          <div style=\"text-align:right;font-family:'IBM Plex Mono',monospace;white-space:nowrap;\">\n            <div style=\"font-size:12px;color:#76746C;letter-spacing:.04em;\">{{ s.hrs }}<\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:600;color:#E94560;margin-top:4px;\">{{ s.rate }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:1px;background:#0E0E0F;margin-top:64px;border:1px solid #0E0E0F;align-items:stretch;\">\n      <div data-reveal=\"\" style=\"background:#0E0E0F;color:#F4F3EE;padding:clamp(28px,4vw,48px);\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#E94560;\">Tell us about your project<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px;margin-top:24px;\">\n          <div style=\"border:1px solid rgba(255,255,255,.2);padding:13px 16px;font-size:14px;color:rgba(244,243,238,.45);font-family:'IBM Plex Mono',monospace;\">Name <span style=\"color:#E94560;\">required<\u002Fspan><\u002Fdiv>\n          <div style=\"border:1px solid rgba(255,255,255,.2);padding:13px 16px;font-size:14px;color:rgba(244,243,238,.45);font-family:'IBM Plex Mono',monospace;\">Company<\u002Fdiv>\n          <sc-for list=\"{{ formChips }}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,243,238,.5);margin-bottom:10px;\">{{ f.label }}<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n                <sc-for list=\"{{ f.opts }}\" as=\"o\" hint-placeholder-count=\"4\">\n                  <span style=\"border:1px solid rgba(255,255,255,.2);padding:8px 14px;font-size:13px;font-family:'IBM Plex Mono',monospace;color:rgba(244,243,238,.8);\" style-hover=\"border-color:#E94560;color:#fff;\">{{ o }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"margin-top:6px;background:#E94560;color:#fff;text-align:center;padding:15px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.06em;text-transform:uppercase;\">Send →<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"0.08\" style=\"background:#1a1a18;color:#F4F3EE;padding:clamp(28px,4vw,48px);display:flex;flex-direction:column;justify-content:center;\">\n        <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(22px,2.6vw,30px);line-height:1.15;letter-spacing:-.015em;margin:0;\">Budget is a respect question, not a rude one.<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.6;color:rgba(244,243,238,.7);margin:20px 0 0;\">It filters tyre-kickers before they eat your calendar, anchors the conversation at the value level, and lets you walk into the call already knowing if this is a £6k refresh or a £40k rebrand.<\u002Fp>\n        <p style=\"font-family:'Newsreader',serif;font-style:italic;font-size:19px;line-height:1.45;color:#FFD460;margin:24px 0 0;\">“This helps me recommend the right level of work. No wrong answer, and ‘not sure yet’ is fine.”<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"proposals\" data-pxhost=\"\" style=\"position:relative;padding:clamp(90px,12vh,160px) clamp(20px,4vw,52px);border-top:1px solid rgba(17,17,16,.1);\">\n  <div style=\"max-width:1180px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:30px;height:1px;background:#E94560;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#E94560;font-weight:500;\">05 / Phase 2 · Proposals &amp; payment<\u002Fspan><\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-family:'Space Grotesk';font-weight:500;font-size:clamp(34px,5.4vw,78px);line-height:1.0;letter-spacing:-.025em;margin:26px 0 0;max-width:18ch;\">One Sheet of truth. A document that sells.<\u002Fh2>\n    <p data-reveal=\"0.06\" style=\"font-size:clamp(17px,1.5vw,21px);line-height:1.55;color:#46443E;max-width:64ch;margin:30px 0 0;\">The job type pulls the right chapters and the price comes from one Google Sheet your accountant can also read. The client sees chapters, judgement and a single investment figure. The hours and rate never leave the Sheet.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:1px;background:rgba(17,17,16,.14);margin-top:60px;border:1px solid rgba(17,17,16,.14);\">\n      <div data-reveal=\"\" style=\"background:#F4F3EE;padding:clamp(24px,3vw,36px);\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#76746C;margin-bottom:18px;\">tough-crowd-pricing · the source of truth<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:2fr .7fr .8fr 1fr;font-family:'IBM Plex Mono',monospace;font-size:13px;\">\n          <div style=\"padding:10px 0;border-bottom:2px solid #0E0E0F;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#76746C;\">Service<\u002Fdiv>\n          <div style=\"padding:10px 0;border-bottom:2px solid #0E0E0F;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#76746C;text-align:right;\">Hrs<\u002Fdiv>\n          <div style=\"padding:10px 0;border-bottom:2px solid #0E0E0F;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#76746C;text-align:right;\">Rate<\u002Fdiv>\n          <div style=\"padding:10px 0;border-bottom:2px solid #0E0E0F;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#76746C;text-align:right;\">Line<\u002Fdiv>\n          <sc-for list=\"{{ pricingRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n            <div style=\"padding:13px 0;border-bottom:1px solid rgba(17,17,16,.14);color:#1a1a18;\">{{ r.svc }}<\u002Fdiv>\n            <div style=\"padding:13px 0;border-bottom:1px solid rgba(17,17,16,.14);text-align:right;color:#E94560;\">{{ r.hrs }}<\u002Fdiv>\n            <div style=\"padding:13px 0;border-bottom:1px solid rgba(17,17,16,.14);text-align:right;color:#E94560;\">{{ r.rate }}<\u002Fdiv>\n            <div style=\"padding:13px 0;border-bottom:1px solid rgba(17,17,16,.14);text-align:right;color:#1a1a18;\">{{ r.line }}<\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"padding:14px 0 0;font-weight:600;color:#0E0E0F;text-transform:uppercase;font-size:11px;letter-spacing:.08em;\">Total to client<\u002Fdiv>\n          <div style=\"padding:14px 0 0;\"><\u002Fdiv>\n          <div style=\"padding:14px 0 0;\"><\u002Fdiv>\n          <div style=\"padding:14px 0 0;text-align:right;font-weight:600;font-size:18px;color:#0E0E0F;\">{{ pricingTotal }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:18px;margin-top:18px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#76746C;\">\n          <span style=\"color:#1a1a18;\">■ Client price<\u002Fspan><span style=\"color:#E94560;\">■ Hidden hours<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"0.08\" style=\"background:#0E0E0F;color:#F4F3EE;padding:clamp(24px,3vw,36px);display:flex;flex-direction:column;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,243,238,.5);\">Rebrand proposal · Acme<\u002Fdiv>\n        <ol style=\"list-style:none;counter-reset:ch;margin:18px 0 0;padding:0;display:flex;flex-direction:column;gap:2px;flex:1;\">\n          <sc-for list=\"{{ chapters }}\" as=\"ch\" hint-placeholder-count=\"8\">\n            <li style=\"display:flex;gap:12px;font-size:14px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.08);align-items:center;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#E94560;min-width:20px;\">{{ ch.num }}<\u002Fspan><span style=\"color:rgba(244,243,238,.85);\">{{ ch.name }}<\u002Fspan><\u002Fli>\n          <\u002Fsc-for>\n        <\u002Fol>\n        <div style=\"margin-top:22px;border-top:1px solid rgba(255,255,255,.18);padding-top:18px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,243,238,.5);\">Investment<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:38px;letter-spacing:-.02em;margin-top:6px;\">£27,750<\u002Fdiv>\n          <div style=\"font-size:12px;color:#76746C;font-family:'IBM Plex Mono',monospace;\">value, not hours · 50% deposit · Stripe<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"margin-top:48px;border:1px solid #0E0E0F;background:#0E0E0F;color:#F4F3EE;padding:clamp(28px,4vw,48px);display:grid;grid-template-columns:auto 1fr;gap:clamp(20px,4vw,48px);align-items:start;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#E94560;white-space:nowrap;\">The critic’s flag<br>don’t skip this<\u002Fdiv>\n      <p style=\"font-size:clamp(17px,1.8vw,23px);line-height:1.45;margin:0;\">The plan jumps from proposal to deposit. <span style=\"color:#E94560;\">Put a signed scope between them.<\u002Fspan> The unsigned-scope gap is where free revisions, scope creep and non-payment live. Pair the e-sign with the deposit so signature and money happen together, and issue a proper UK VAT invoice your accountant can reconcile.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"app\" data-pxhost=\"\" style=\"position:relative;padding:clamp(90px,12vh,160px) clamp(20px,4vw,52px);background:#0E0E0F;color:#F4F3EE;\">\n  <div data-parallax=\"0.12\" style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:64px 64px;opacity:.5;\"><\u002Fdiv>\n  <div style=\"position:relative;max-width:1180px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:30px;height:1px;background:#E94560;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#E94560;font-weight:500;\">06 / Phase 3 · The Studio app<\u002Fspan><\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-family:'Space Grotesk';font-weight:500;font-size:clamp(34px,5.4vw,78px);line-height:1.0;letter-spacing:-.025em;margin:26px 0 0;max-width:16ch;\">Your private cockpit, and the one number that matters.<\u002Fh2>\n    <p data-reveal=\"0.06\" style=\"font-size:clamp(17px,1.5vw,21px);line-height:1.55;color:rgba(244,243,238,.7);max-width:64ch;margin:30px 0 0;\">A bespoke app only you log into. Build the data foundation and dashboard first, then add modules one at a time. Everything else exists to feed one number: your real effective hourly rate per job.<\u002Fp>\n\n    <div data-reveal=\"0.05\" style=\"margin-top:56px;border:1px solid rgba(255,255,255,.16);background:#141415;\">\n      <div style=\"display:flex;align-items:center;gap:8px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.12);\">\n        <span style=\"width:10px;height:10px;border-radius:50%;background:#E94560;\"><\u002Fspan><span style=\"width:10px;height:10px;border-radius:50%;background:#FFD460;\"><\u002Fspan><span style=\"width:10px;height:10px;border-radius:50%;background:#16C79A;\"><\u002Fspan>\n        <span style=\"margin-left:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(244,243,238,.5);\">studio.toughcrowd.studio<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:4px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.1);flex-wrap:wrap;\">\n        <sc-for list=\"{{ appTabs }}\" as=\"t\" hint-placeholder-count=\"6\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;padding:7px 13px;color:rgba(244,243,238,.6);\" style-hover=\"color:#fff;\">{{ t }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.1);\">\n        <sc-for list=\"{{ appStats }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"background:#141415;padding:24px 22px;\">\n            <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(30px,4vw,52px);letter-spacing:-.02em;\"><span data-count=\"{{ s.c }}\" data-suffix=\"{{ s.suffix }}\">0{{ s.suffix }}<\u00 238,.7);\">{{ p.label }}<\u002Fspan>\n                <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:22px;color:{{ p.clr }};\">{{ p.val }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#E94560;margin-top:72px;\">The deadline colour rule<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:rgba(255,255,255,.16);margin-top:16px;border:1px solid rgba(255,255,255,.16);\">\n      <sc-for list=\"{{ deadlineRules }}\" as=\"r\" hint-placeholder-count=\"4\">\n        <div style=\"background:#141415;padding:22px 20px;border-top:3px solid;border-top-color:{{ r.color }};\">\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:18px;color:{{ r.color }};\">{{ r.name }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:rgba(244,243,238,.6);margin-top:6px;font-family:'IBM Plex Mono',monospace;\">{{ r.when }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#E94560;margin-top:72px;\">The six modules<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:rgba(255,255,255,.16);margin-top:16px;border:1px solid rgba(255,255,255,.16);\">\n      <sc-for list=\"{{ modules }}\" as=\"m\" hint-placeholder-count=\"6\">\n        <div data-reveal=\"{{ m.d }}\" style=\"background:#141415;padding:28px 26px;\" style-hover=\"background:#1b1b1c;\">\n          <div style=\"display:flex;align-items:center;gap:12px;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:#E94560;\">{{ m.n }}<\u002Fspan>\n            <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:19px;letter-spacing:-.01em;margin:0;\">{{ m.title }}<\u002Fh3>\n          <\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.55;color:rgba(244,243,238,.65);margin:14px 0 0;\">{{ m.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"pipeline\" data-pxhost=\"\" style=\"position:relative;padding:clamp(90px,12vh,160px) clamp(20px,4vw,52px);border-top:1px solid rgba(17,17,16,.1);\">\n  <div style=\"max-width:1180px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:30px;height:1px;background:#E94560;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#E94560;font-weight:500;\">07 / Phase 4 · Pipeline &amp; capacity<\u002Fspan><\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-family:'Space Grotesk';font-weight:500;font-size:clamp(34px,5.4vw,78px);line-height:1.0;letter-spacing:-.025em;margin:26px 0 0;max-width:16ch;\">Know what converts. Protect your time.<\u002Fh2>\n    <p data-reveal=\"0.06\" style=\"font-size:clamp(17px,1.5vw,21px);line-height:1.55;color:#46443E;max-width:64ch;margin:30px 0 0;\">A clear read on which enquiries become work, and an honest view of how much capacity is left before saying yes to the next one.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(17,17,16,.14);margin-top:56px;border:1px solid rgba(17,17,16,.14);align-items:start;\">\n      <sc-for list=\"{{ pipelineCols }}\" as=\"col\" hint-placeholder-count=\"4\">\n        <div style=\"background:#F4F3EE;padding:20px 18px;min-height:260px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid;border-bottom-color:{{ col.accent }};padding-bottom:10px;margin-bottom:14px;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#1a1a18;\">{{ col.name }}<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px;color:{{ col.accent }};\">{{ col.count }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <sc-for list=\"{{ col.cards }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div style=\"border:1px solid rgba(17,17,16,.16);padding:12px 13px;background:#fff;\" style-hover=\"border-color:#0E0E0F;\">\n                <div style=\"font-size:14px;font-weight:500;color:#1a1a18;\">{{ c.title }}<\u002Fdiv>\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#76746C;margin-top:5px;\">{{ c.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:auto 1fr;gap:clamp(20px,4vw,56px);align-items:center;margin-top:48px;border:1px solid #0E0E0F;background:#0E0E0F;color:#F4F3EE;padding:clamp(28px,4vw,48px);\">\n      <div data-reveal=\"\" style=\"text-align:center;\">\n        <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(56px,8vw,104px);line-height:.85;letter-spacing:-.03em;color:#16C79A;\"><span data-count=\"64\" data-suffix=\"%\">0%<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,243,238,.5);margin-top:10px;\">win rate<\u002Fdiv>\n      <\u002Fdiv>\n      <p data-reveal=\"0.06\" style=\"font-size:clamp(16px,1.8vw,22px);line-height:1.45;margin:0;\">Don’t stop at a list of leads. The numbers worth surfacing are <span style=\"color:#E94560;\">win rate by lead source and budget band, and average deal size.<\u002Fspan> Those tell you which enquiries to chase and which to decline. A healthy decline-and-still-win rate is the proof the strategy works.<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"margin-top:40px;border:1px solid rgba(17,17,16,.2);padding:clamp(24px,3vw,40px);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#E94560;\">Deadline alerts, automated<\u002Fdiv>\n      <p style=\"font-size:16px;line-height:1.6;color:#46443E;margin:14px 0 18px;max-width:70ch;\">Reuse the exact amber/red thresholds to fire internal emails to you on a daily Resend cron. The subject carries the state so it’s scannable on your phone. One sender, one recipient, no client ever sees it.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;\">\n        <div style=\"padding:11px 14px;background:#0E0E0F;color:#FFD460;\">AMBER: Bó tone of voice due in 2 days<\u002Fdiv>\n        <div style=\"padding:11px 14px;background:#0E0E0F;color:#E94560;\">OVERDUE: Acme logo pack, 1 day late<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"brandpad\" data-pxhost=\"\" style=\"position:relative;padding:clamp(90px,12vh,160px) clamp(20px,4vw,52px);background:#0E0E0F;color:#F4F3EE;\">\n  <div style=\"position:relative;max-width:1180px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:30px;height:1px;background:#E94560;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#E94560;font-weight:500;\">08 / Phase 5 · Living guidelines<\u002Fspan><\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-family:'Space Grotesk';font-weight:500;font-size:clamp(34px,5.4vw,78px);line-height:1.0;letter-spacing:-.025em;margin:26px 0 0;max-width:15ch;\">Your own Brandpad. A recurring revenue floor.<\u002Fh2>\n    <p data-reveal=\"0.06\" style=\"font-size:clamp(17px,1.5vw,21px);line-height:1.55;color:rgba(244,243,238,.7);max-width:64ch;margin:30px 0 0;\">A hosted home for each client’s brand: copyable colours, downloadable fonts with licences, logos in every variant, clear do/don’t rules. Brandpad charges $50 to $125 a month for this. Clients already pay monthly to keep guidelines live. That’s your opening.<\u002Fp>\n\n    <div data-reveal=\"0.05\" style=\"margin-top:56px;border:1px solid rgba(255,255,255,.16);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(244,243,238,.5);padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.12);\">studio.toughcrowd.studio/acme<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:rgba(255,255,255,.16);\">\n        <sc-for list=\"{{ palette }}\" as=\"c\" hint-placeholder-count=\"5\">\n          <div style=\"background:{{ c.hex }};aspect-ratio:1/1.05;display:flex;flex-direction:column;justify-content:flex-end;padding:16px;color:#F4F3EE;\" style-hover=\"filter:brightness(1.08);\">\n            <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:16px;\">{{ c.name }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;opacity:.85;display:flex;align-items:center;gap:6px;\">{{ c.hex }} <span style=\"opacity:.6;\">copy<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:1px;background:rgba(255,255,255,.16);border-top:1px solid rgba(255,255,255,.16);\">\n        <div style=\"background:#141415;padding:clamp(24px,3vw,40px);\">\n          <div style=\"font-family:'Space Grotesk';font-weight:500;font-size:clamp(40px,6vw,76px);line-height:1;letter-spacing:-.02em;\">Aa Bb Cc 123<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(244,243,238,.5);margin-top:16px;\">Space Grotesk · Display · licence: SIL OFL · download ↓<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#141415;padding:clamp(24px,3vw,40px);display:flex;flex-direction:column;gap:18px;justify-content:center;\">\n          <div>\n            <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px;color:#16C79A;\">✓ Do<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.5;color:rgba(244,243,238,.7);margin:6px 0 0;\">Keep clear space. Use approved colourways. Hold the proportions.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px;color:#E94560;\">✕ Don’t<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.5;color:rgba(244,243,238,.7);margin:6px 0 0;\">Stretch it. Recolour it. Add a drop shadow. Put it on a busy photo.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"margin-top:48px;border:1px solid rgba(255,255,255,.2);padding:clamp(28px,4vw,48px);display:grid;grid-template-columns:auto 1fr;gap:clamp(20px,4vw,48px);align-items:start;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#E94560;white-space:nowrap;\">Why this is<br>the real prize<\u002Fdiv>\n      <p style=\"font-size:clamp(17px,1.8vw,23px);line-height:1.45;margin:0;\">Your platform cost is flat regardless of how many client brands you host, because they share one app. Charge even £20–40/mo per hosted brand and <span style=\"color:#E94560;\">everything after the first few is near pure margin.<\u002Fspan> Frame it as keeping the brand live and governed, not as software.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"connectors\" data-pxhost=\"\" style=\"position:relative;padding:clamp(90px,12vh,160px) clamp(20px,4vw,52px);border-top:1px solid rgba(17,17,16,.1);\">\n  <div style=\"max-width:1180px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:30px;height:1px;background:#E94560;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#E94560;font-weight:500;\">09 / Connectors &amp; custom agents<\u002Fspan><\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-family:'Space Grotesk';font-weight:500;font-size:clamp(34px,5.4vw,78px);line-height:1.0;letter-spacing:-.025em;margin:26px 0 0;max-width:18ch;\">Wire Claude into everything you already use.<\u002Fh2>\n    <p data-reveal=\"0.06\" style=\"font-size:clamp(17px,1.5vw,21px);line-height:1.55;color:#46443E;max-width:64ch;margin:30px 0 0;\">The governing rule: Google Sheets stays the single source of truth for pricing, feeding both client quotes and your accountant. Never duplicate that number anywhere.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1px;background:rgba(17,17,16,.14);margin-top:56px;border:1px solid rgba(17,17,16,.14);\">\n      <sc-for list=\"{{ connectors }}\" as=\"c\" hint-placeholder-count=\"8\">\n        <div data-reveal=\"{{ c.d }}\" style=\"background:#F4F3EE;padding:26px 24px;\" style-hover=\"background:#fff;\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;\">\n            <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:17px;letter-spacing:-.01em;margin:0;max-width:14ch;\">{{ c.name }}<\u002Fh3>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:#E94560;border:1px solid rgba(233,69,96,.4);padding:3px 7px;white-space:nowrap;\">{{ c.tag }}<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.5;color:#56544D;margin:12px 0 0;\">{{ c.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#E94560;margin-top:72px;\">Five custom agents worth building<\u002Fdiv>\n    <div style=\"margin-top:18px;border-top:1px solid rgba(17,17,16,.18);\">\n      <sc-for list=\"{{ agents }}\" as=\"a\" hint-placeholder-count=\"5\">\n        <div data-reveal=\"{{ a.d }}\" style=\"display:grid;grid-template-columns:56px 1fr auto;gap:clamp(14px,2.5vw,32px);align-items:center;padding:24px 0;border-bottom:1px solid rgba(17,17,16,.18);\" style-hover=\"background:rgba(233,69,96,.04);\">\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:36px;color:#E94560;letter-spacing:-.03em;\">{{ a.n }}<\u002Fdiv>\n          <div>\n            <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(18px,2vw,23px);letter-spacing:-.01em;margin:0;\">{{ a.title }}<\u002Fh3>\n            <p style=\"font-size:14.5px;line-height:1.5;color:#56544D;margin:8px 0 0;max-width:62ch;\">{{ a.body }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.04em;color:#76746C;text-align:right;max-width:14ch;\">{{ a.note }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"margin-top:48px;display:grid;grid-template-columns:auto 1fr;gap:clamp(20px,4vw,48px);align-items:center;border:1px solid #0E0E0F;\">\n      <div style=\"background:#0E0E0F;color:#E6E5DF;font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.8;padding:clamp(24px,3vw,36px);white-space:pre;\">~/Desktop/clients/acme\n<span style=\"color:#76746C;\">acme/<\u002Fspan>\n├─ <span style=\"color:#FFD460;\">CLAUDE.md<\u002Fspan>   brief, voice, contacts\n├─ 01-brief/\n├─ 02-discovery/  research, audit\n├─ 03-design/     working files\n├─ 04-brandbook/  guidelines, do/don't\n└─ 05-delivery/   final assets, fonts<\u002Fdiv>\n      <p style=\"font-size:clamp(16px,1.7vw,21px);line-height:1.5;color:#46443E;padding:0 clamp(8px,2vw,24px);margin:0;\">Add a connector, use it for a few days, then add the next. Don’t wire everything at once. The official Gmail connector can’t send, by design. Any database connector to Supabase must be scoped carefully because it can write live client data.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"numbers\" data-pxhost=\"\" style=\"position:relative;padding:clamp(90px,12vh,160px) clamp(20px,4vw,52px);background:#0E0E0F;color:#F4F3EE;\">\n  <div data-parallax=\"0.12\" style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:64px 64px;opacity:.5;\"><\u002Fdiv>\n  <div style=\"position:relative;max-width:1180px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:30px;height:1px;background:#E94560;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#E94560;font-weight:500;\">10 / The numbers<\u002Fspan><\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-family:'Space Grotesk';font-weight:500;font-size:clamp(34px,5.4vw,78px);line-height:1.0;letter-spacing:-.025em;margin:26px 0 0;max-width:15ch;\">What it actually costs to run.<\u002Fh2>\n    <p data-reveal=\"0.06\" style=\"font-size:clamp(17px,1.5vw,21px);line-height:1.55;color:rgba(244,243,238,.7);max-width:64ch;margin:30px 0 0;\">£0 while you’re on free tiers building it. Then about £50–55 a month flat once the Studio app goes commercial. The cost does not scale with how busy you get, which is exactly right for a solo premium operator.<\u002Fp>\n\n    <div style=\"margin-top:56px;border-top:1px solid rgba(255,255,255,.18);\">\n      <sc-for list=\"{{ costRows }}\" as=\"r\" hint-placeholder-count=\"7\">\n        <div style=\"display:grid;grid-template-columns:minmax(150px,1fr) 2fr auto;gap:clamp(16px,3vw,40px);align-items:center;padding:18px 0;border-bottom:1px solid rgba(255,255,255,.1);\" style-hover=\"background:rgba(255,255,255,.03);\">\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(17px,2vw,22px);letter-spacing:-.01em;\">{{ r.svc }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;color:rgba(244,243,238,.6);\">{{ r.what }}<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:500;color:#16C79A;text-align:right;white-space:nowrap;\">{{ r.cost }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <div data-reveal=\"\" style=\"display:grid;grid-template-columns:1fr auto;gap:clamp(16px,3vw,40px);align-items:center;padding:34px 0 0;\">\n        <div>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(244,243,238,.5);\">Live and running · flat, whether you have 2 clients or 200<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(20px,2.4vw,28px);letter-spacing:-.015em;margin-top:8px;\">All-in monthly<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(64px,11vw,150px);line-height:.8;letter-spacing:-.04em;color:#E94560;white-space:nowrap;\"><span data-count=\"71\" data-prefix=\"~£\">~£0<\u002Fspan><span style=\"font-size:.34em;font-weight:500;color:rgba(244,243,238,.5);\">/mo<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p data-reveal=\"\" style=\"font-size:14px;line-height:1.6;color:rgba(244,243,238,.45);font-family:'IBM Plex Mono',monospace;margin:28px 0 0;max-width:80ch;\">The infrastructure trio (Vercel + Supabase + Resend) is the ~£50–55/mo the rest of this plan refers to. Stripe is taken per payment, not billed monthly. Free tiers mean you pay almost none of this until the app is doing real work.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"additions\" data-pxhost=\"\" style=\"position:relative;padding:clamp(90px,12vh,160px) clamp(20px,4vw,52px);border-top:1px solid rgba(17,17,16,.1);\">\n  <div style=\"max-width:1180px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:30px;height:1px;background:#E94560;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#E94560;font-weight:500;\">11 / What to add<\u002Fspan><\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-family:'Space Grotesk';font-weight:500;font-size:clamp(34px,5.4vw,78px);line-height:1.0;letter-spacing:-.025em;margin:26px 0 0;max-width:14ch;\">The gaps worth closing.<\u002Fh2>\n    <p data-reveal=\"0.06\" style=\"font-size:clamp(17px,1.5vw,21px);line-height:1.55;color:#46443E;max-width:64ch;margin:30px 0 0;\">A separate review pass stress-tested the plan for what was missing. These additions add real commercial leverage, not vanity features, ranked by priority.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:rgba(17,17,16,.14);margin-top:56px;border:1px solid rgba(17,17,16,.14);\">\n      <sc-for list=\"{{ gaps }}\" as=\"g\" hint-placeholder-count=\"8\">\n        <div data-reveal=\"{{ g.d }}\" style=\"background:#F4F3EE;padding:28px 26px;\" style-hover=\"background:#fff;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#0E0E0F;background:{{ g.tc }};padding:4px 9px;\">{{ g.tier }}<\u002Fspan>\n          <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:18px;line-height:1.2;letter-spacing:-.01em;margin:16px 0 0;\">{{ g.title }}<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:#56544D;margin:12px 0 0;\">{{ g.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#E94560;margin-top:72px;\">The risks, named<\u002Fdiv>\n    <div style=\"margin-top:18px;border-top:1px solid rgba(17,17,16,.18);\">\n      <sc-for list=\"{{ risks }}\" as=\"r\" hint-placeholder-count=\"4\">\n        <div data-reveal=\"\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,3vw,48px);padding:24px 0;border-bottom:1px solid rgba(17,17,16,.18);\">\n          <p style=\"font-size:clamp(16px,1.7vw,20px);line-height:1.4;font-weight:500;color:#1a1a18;margin:0;\">{{ r.risk }}<\u002Fp>\n          <p style=\"font-size:14.5px;line-height:1.55;color:#56544D;margin:0;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#16C79A;\">Mitigation&nbsp;&nbsp;<\u002Fspan>{{ r.mit }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"start\" data-pxhost=\"\" style=\"position:relative;padding:clamp(90px,12vh,150px) clamp(20px,4vw,52px) clamp(60px,8vh,90px);background:#0E0E0F;color:#F4F3EE;overflow:hidden;\">\n  <div data-parallax=\"0.16\" aria-hidden=\"true\" style=\"position:absolute;right:-3%;top:6%;font-family:'Space Grotesk';font-weight:700;font-size:30vw;line-height:.8;color:rgba(255,255,255,.025);letter-spacing:-.04em;pointer-events:none;white-space:nowrap;\">12<\u002Fdiv>\n  <div style=\"position:relative;max-width:1180px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:30px;height:1px;background:#E94560;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#E94560;font-weight:500;\">12 / Where to start<\u002Fspan><\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-family:'Space Grotesk';font-weight:500;font-size:clamp(38px,7vw,108px);line-height:.95;letter-spacing:-.03em;margin:26px 0 0;max-width:16ch;\">Build the earning engine first. <span style=\"color:#E94560;\">Instrument it second.<\u002Fspan><\u002Fh2>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1px;background:rgba(255,255,255,.16);margin-top:64px;border:1px solid rgba(255,255,255,.16);\">\n      <div data-reveal=\"\" style=\"background:#0E0E0F;padding:30px 28px;\" style-hover=\"background:#141415;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#E94560;\">This week<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:22px;margin:14px 0 0;\">Install &amp; the brain<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:rgba(244,243,238,.65);margin:10px 0 0;\">Run Phase 0. Claude Code installed, the four accounts open, your CLAUDE.md written. Half a day.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"0.08\" style=\"background:#0E0E0F;padding:30px 28px;\" style-hover=\"background:#141415;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#E94560;\">Next<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:22px;margin:14px 0 0;\">Get found<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:rgba(244,243,238,.65);margin:10px 0 0;\">Ship the marketing site with the positioning and the budget-led enquiry form. The only real launch.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"0.16\" style=\"background:#0E0E0F;padding:30px 28px;\" style-hover=\"background:#141415;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#E94560;\">Then<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:22px;margin:14px 0 0;\">Win one by hand<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:rgba(244,243,238,.65);margin:10px 0 0;\">Land a job and run the proposal-to-deposit flow once, manually. Only then build the app modules the friction demands.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#E94560;margin-top:80px;\">The whole plan in seven lines<\u002Fdiv>\n    <div style=\"margin-top:18px;border-top:1px solid rgba(255,255,255,.18);\">\n      <sc-for list=\"{{ sevenLines }}\" as=\"l\" hint-placeholder-count=\"7\">\n        <div data-reveal=\"\" style=\"display:grid;grid-template-columns:40px 1fr;gap:clamp(14px,2vw,28px);padding:18px 0;border-bottom:1px solid rgba(255,255,255,.12);align-items:baseline;\">\n          <span style=\"color:#E94560;font-size:18px;line-height:1.4;\">→<\u002Fspan>\n          <p style=\"font-size:clamp(16px,1.9vw,23px);line-height:1.4;margin:0;\"><strong style=\"color:#F4F3EE;font-weight:600;\">{{ l.lead }}<\u002Fstrong> <span style=\"color:rgba(244,243,238,.62);\">{{ l.rest }}<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"margin-top:80px;padding-top:36px;border-top:1px solid rgba(255,255,255,.18);display:flex;flex-wrap:wrap;gap:20px;align-items:center;justify-content:space-between;\">\n      <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:21px;\">Tough <span style=\"color:#E94560;\">Crowd<\u002Fspan> Studio<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(244,243,238,.45);letter-spacing:.04em;max-width:60ch;\">Built for Justin Murtagh. Setup steps, prices and free-tier limits web-verified June 2026. Providers change their terms, so confirm each one at sign-up before you commit money.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  setRoot = (el) => { this.rootEl = el; };\n\n  componentDidMount() {\n    const root = this.rootEl; if (!root) return;\n    const reveals = root.querySelectorAll('[data-reveal]');\n    reveals.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(34px)';\n      el.style.transition = 'opacity .85s cubic-bezier(.16,.7,.2,1), transform .85s cubic-bezier(.16,.7,.2,1)';\n    });\n    const io = new IntersectionObserver((ents) => {\n      ents.forEach(e => {\n        if (e.isIntersecting) {\n          const el = e.target;\n          const d = parseFloat(el.getAttribute('data-reveal')) || 0;\n          el.style.transitionDelay = d + 's';\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n          io.unobserve(el);\n        }\n      });\n    }, { threshold: 0.1, rootMargin: '0px 0px -7% 0px' });\n    reveals.forEach(el => io.observe(el));\n\n    const cio = new IntersectionObserver((ents) => {\n      ents.forEach(e => { if (e.isIntersecting) { this.animateCount(e.target); cio.unobserve(e.target); } });\n    }, { threshold: 0.6 });\n    root.querySelectorAll('[data-count]').forEach(el => cio.observe(el));\n\n    const hero = root.querySelector('[data-hero]');\n    const nav = root.querySelector('[data-nav]');\n    const prog = root.querySelector('[data-progress]');\n    this.onScroll = () => {\n      const y = window.scrollY || document.documentElement.scrollTop || 0;\n      const vh = window.innerHeight;\n      root.querySelectorAll('[data-parallax]').forEach(el => {\n        const s = parseFloat(el.getAttribute('data-parallax'));\n        const host = el.closest('[data-pxhost]') || el.parentElement;\n        const r = host.getBoundingClientRect();\n        const c = (r.top + r.height / 2 - vh / 2);\n        el.style.transform = 'translate3d(0,' + (-c * s) + 'px,0)';\n      });\n      const docH = document.documentElement.scrollHeight - vh;\n      if (prog) prog.style.width = (docH > 0 ? (y / docH * 100) : 0) + '%';\n      if (nav && hero) this.setNav(nav, y > hero.offsetHeight - 90);\n    };\n    window.addEventListener('scroll', this.onScroll, { passive: true });\n    window.addEventListener('resize', this.onScroll, { passive: true });\n    this.onScroll();\n  }\n\n  setNav(nav, solid) {\n    if (this._navSolid === solid) return; this._navSolid = solid;\n    nav.style.background = solid ? 'rgba(244,243,238,.85)' : 'transparent';\n    nav.style.backdropFilter = solid ? 'blur(14px)' : 'none';\n    nav.style.webkitBackdropFilter = solid ? 'blur(14px)' : 'none';\n    nav.style.borderBottomColor = solid ? 'rgba(17,17,16,.12)' : 'rgba(255,255,255,0)';\n    const ink = solid ? '#111110' : '#F4F3EE';\n    const wm = nav.querySelector('[data-wm]'); if (wm) wm.style.color = ink;\n    nav.querySelectorAll('[data-navlink]').forEach(a => { a.style.color = ink; });\n    const cta = nav.querySelector('[data-navcta]');\n    if (cta) { cta.style.background = solid ? '#111110' : '#E94560'; cta.style.color = '#fff'; }\n  }\n\n  animateCount(el) {\n    const target = parseFloat(el.getAttribute('data-count'));\n    const dec = parseInt(el.getAttribute('data-decimals') || '0');\n    const pre = el.getAttribute('data-prefix') || '';\n    const suf = el.getAttribute('data-suffix') || '';\n    const dur = 1500; const start = performance.now();\n    const step = (now) => {\n      const t = Math.min(1, (now - start) / dur);\n      const e = 1 - Math.pow(1 - t, 3);\n      const v = target * e;\n      el.textContent = pre + (dec ? v.toFixed(dec) : Math.round(v).toLocaleString('en-GB')) + suf;\n      if (t < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }\n\n  componentWillUnmount() {\n    if (this.onScroll) { window.removeEventListener('scroll', this.onScroll); window.removeEventListener('resize', this.onScroll); }\n  }\n\n  renderVals() {\n    return {\n      setRoot: this.setRoot,\n      heroMeta: [\n        { k: 'For', v: 'Justin Murtagh' },\n        { k: 'Discipline', v: 'Branding & rebranding' },\n        { k: 'Build partner', v: 'Claude Code' },\n        { k: 'Stack', v: 'Cloudflare · Vercel · Supabase · Resend' },\n        { k: 'Running cost', v: '£0 to start, ~£50–55/mo' }\n      ],\n      bigCards: [\n        { tag: 'Cloudflare', title: 'Marketing site', body: 'toughcrowd.studio. The shop window that wins work. Free to host.', d: '0' },\n        { tag: 'Vercel + Supabase', title: 'Studio app', body: 'Your private cockpit. Projects, time, money, capacity. Login locked to you.', d: '.07' },\n        { tag: 'Resend', title: 'Email engine', body: 'Sign-in links, client updates and deadline alerts to you, from your own domain.', d: '.14' },\n        { tag: 'Connectors', title: 'Your tools', body: 'Google Workspace, Adobe, Apple. Claude reads and acts inside what you already use.', d: '.21' }\n      ],\n      phases: [\n        { n: '0', time: '½ to 1 day', title: 'Setup & the operating brain', d: '0', items: ['Claude Code installed and signed in, on a safe permission mode', 'Fresh accounts: Cloudflare, Vercel, Supabase, Resend', 'A studio-wide CLAUDE.md holding your voice, pricing rules and the hours-stay-hidden rule', 'toughcrowd.studio sitting in Cloudflare with DNS and SSL sorted'] },\n        { n: '1', time: '3 to 5 days · the only real launch', title: 'Get found and take enquiries', d: '.05', items: ['Marketing site live with the “stand out from the noise” positioning', 'Budget-led enquiry form landing in a Sheet, with a Resend confirmation', 'A one-page terms/scope template and a UK VAT-compliant invoice format', 'A short privacy notice published. This is the point you can win work.'] },\n        { n: '2', time: '4 to 7 days', title: 'Close and get paid without leaks', d: '.1', items: ['Proposal g ient email lives, kept separate from personal Gmail.', d: '.2' },\n        { name: 'Apple Calendar / Notes', tag: 'Community', body: 'Real but community-built. Treat as second-tier, or make Google Calendar your single calendar.', d: '.25' },\n        { name: 'Cloudflare', tag: 'Official', body: 'Manage DNS and hosting for the marketing site by chatting. Add the docs and builds servers.', d: '.3' },\n        { name: 'Vercel & Supabase', tag: 'Official', body: 'Deploys, project management, and the app database. Scope the database connector read-mostly.', d: '.35' }\n      ],\n      agents: [\n        { n: '1', title: 'New-project agent', body: 'Spins up a client end to end: local folder, client CLAUDE.md, Drive mirror, ops board, opening tasks, linked pricing row.', note: 'Build first · enforces the discipline', d: '0' },\n        { n: '2', title: 'Quote-from-Sheet calculator', body: 'Turns a scope into a client price by reading the master Sheet, never guessing. Returns a clean figure plus the margin check.', note: 'Build second', d: '.06' },\n        { n: '3', title: 'Proposal-builder', body: 'Assembles a finished, on-brand proposal from the brief, the quote and your positioning. Drafts for review, never sends.', note: 'Then', d: '.12' },\n        { n: '4', title: 'Brandbook-drafter', body: 'Turns approved brand decisions into a structured brandbook draft, pulling assets via the Adobe connector. Gets you to 70%.', note: 'Where Adobe earns its keep', d: '.18' },\n        { n: '5', title: 'Client-update-writer', body: 'Writes the short, human progress update a client actually wants: what’s done, what’s next, what you need.', note: 'Draft or Resend send', d: '.24' }\n      ],\n      costRows: [\n        { svc: 'Claude Pro', what: 'Build partner and daily console', cost: '~£16' },\n        { svc: 'Cloudflare', what: 'Marketing site hosting + DNS', cost: '£0' },\n        { svc: 'Vercel Pro', what: 'The Studio app (commercial)', cost: '~£16' },\n        { svc: 'Supabase Pr itle: 'Referral capture + a light client portal', body: 'Referral is the dominant channel for premium B2B branding and costs nothing. A read-only status view kills the “where are we?” emails.', d: '.35' }\n      ],\n      risks: [\n        { risk: 'Scope overwhelm: building all nine systems at once and stalling.', mit: 'The phased roadmap is a contract with yourself, not a menu. The only launch-blockers are a site that takes enquiries and a way to take deposits.' },\n        { risk: 'The app becomes a procrastination project that replaces selling.', mit: 'No module gets built until a real live client has created the problem it solves. Revenue first, tooling second.' },\n        { risk: 'Trusting the agent too much: a bad email sent, a broken deploy.', mit: 'Stay on a permission mode that asks first. Emails drafted never sent, deploys confirmed never silent.' },\n        { risk: 'The hours-hidden, Sheet-is-truth discipline silently breaks.', mit: 'One place holds the number. The app references the Sheet figure, it never re-stores it.' }\n      ],\n      sevenLines: [\n        { lead: 'The product is judgement.', rest: 'The site, the pricing and the budget question all exist to qualify buyers who get that.' },\n        { lead: 'Two properties, one brand:', rest: 'a free Cloudflare marketing site, a paid Vercel + Supabase Studio app, joined by a client login.' },\n        { lead: 'One Google Sheet', rest: 'is the source of truth for pricing. The client sees the total, never the hours.' },\n        { lead: 'The Profitability Loop', rest: '(quoted hidden hours vs actual tracked) is the one number that proves your pricing holds.' },\n        { lead: 'Build the website first,', rest: 'win a job, then build the app one module at a time. Never all at once.' },\n        { lead: 'Sign before you take a deposit,', rest: 'invoice properly, back up the database. The gaps that cost real money.' },\n        { lead: '~£0 to start, ~£71/mo all-in once live,', rest: 'flat regardless o
